<!DOCTYPE html>
<html lang="es">
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;padding:32px 0;">
    <tr><td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0"
             style="background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;">
        <tr><td style="background:#4f46e5;padding:22px 32px;">
          <span style="color:#ffffff;font-size:20px;font-weight:bold;letter-spacing:-0.5px;">Stockly</span>
        </td></tr>
        <tr><td style="padding:32px;">
          <h1 style="margin:0 0 14px;font-size:20px;color:#0f172a;">{{ title }}</h1>
          <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#475569;">{{ intro }}</p>
          <a href="{{ link }}"
             style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;
                    font-size:15px;font-weight:bold;padding:13px 26px;border-radius:999px;">{{ button_label }}</a>
          <p style="margin:26px 0 0;font-size:13px;line-height:1.6;color:#94a3b8;">
            Si el botón no funciona, copia y pega este enlace en tu navegador:<br>
            <a href="{{ link }}" style="color:#4f46e5;word-break:break-all;">{{ link }}</a>
          </p>
        </td></tr>
        <tr><td style="padding:20px 32px;border-top:1px solid #e2e8f0;">
          <p style="margin:0;font-size:12px;color:#94a3b8;">{{ footer }}</p>
        </td></tr>
      </table>
      <p style="margin:18px 0 0;font-size:12px;color:#cbd5e1;">© Stockly</p>
    </td></tr>
  </table>
</body>
</html>
